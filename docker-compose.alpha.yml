services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devsync
      POSTGRES_USER: devsync
      POSTGRES_PASSWORD: devsync
    ports:
      - "5432:5432"
    volumes:
      - devsync_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devsync -d devsync"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - server/.env.alpha
    environment:
      DEVSYNC_DATABASE_URL: postgresql+asyncpg://devsync:devsync@postgres:5432/devsync
      DEVSYNC_STORAGE_ROOT: /app/server/storage
    ports:
      - "8000:8000"
    volumes:
      - devsync_storage:/app/server/storage
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  devsync_postgres:
  devsync_storage:

